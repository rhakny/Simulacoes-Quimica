<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de Soluções | Concentração e Diluição</title>
    <meta name="description"
        content="Simulador interativo de química para estudo de concentração e diluição de soluções. Calcule C=m/V e experimente a Lei da Diluição em tempo real.">
    <!-- Open Graph -->
    <meta property="og:title" content="Laboratório de Soluções | Concentração e Diluição">
    <meta property="og:description" content="Simule misturas químicas e calcule concentrações em tempo real.">
    <meta property="og:type" content="website">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Scripts Externos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #06090f;
            --panel-glass: rgba(13, 17, 23, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2ff;
            --accent-emerald: #00ff9d;
            --accent-amber: #ffb300;
            --accent-rose: #ff4d6d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glass-bright: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 255, 157, 0.03) 0%, transparent 50%);
        }

        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr 350px;
            width: 100vw;
            height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        .panel {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .panel-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent-cyan);
            letter-spacing: 2.5px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            font-weight: 800;
        }

        .panel-title::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        /* --- MOBILE NAVIGATION --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            padding: 12px 24px 34px 24px;
            /* extra bottom padding for iOS home bar */
            z-index: 1000;
            justify-content: space-around;
            align-items: center;
        }

        .mb-nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mb-nav-link i {
            width: 20px;
            height: 20px;
        }

        .mb-nav-link.active {
            color: var(--accent-cyan);
        }

        /* --- SOLUTE SHELF --- */
        .scroll-area {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 12px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .substance-card {
            background: var(--glass-bright);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .substance-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: scale(1.03) translateX(8px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .substance-card.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .substance-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* --- WORKSTATION --- */
        .workstation {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .beaker-container {
            position: relative;
            width: 360px;
            height: 460px;
            margin-bottom: 40px;
        }

        #main-canvas {
            width: 100%;
            height: 100%;
            z-index: 2;
            position: relative;
        }

        .beaker-glass {
            position: absolute;
            inset: 0;
            border-left: 5px solid rgba(255, 255, 255, 0.12);
            border-right: 5px solid rgba(255, 255, 255, 0.12);
            border-bottom: 8px solid rgba(255, 255, 255, 0.12);
            border-radius: 0 0 50px 50px;
            z-index: 3;
            pointer-events: none;
        }

        /* --- HUD & BADGES --- */
        .hud-overlay {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            padding: 20px;
            border-radius: 24px;
            min-width: 220px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .class-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 15px;
            border: 1px solid transparent;
            transition: all 0.4s;
        }

        .state-unsat {
            background: rgba(0, 255, 157, 0.08);
            color: var(--accent-emerald);
            border-color: rgba(0, 255, 157, 0.2);
        }

        .state-sat {
            background: rgba(255, 179, 0, 0.08);
            color: var(--accent-amber);
            border-color: rgba(255, 179, 0, 0.2);
        }

        .state-supersat {
            background: rgba(255, 77, 109, 0.08);
            color: var(--accent-rose);
            border-color: rgba(255, 77, 109, 0.2);
        }

        /* --- CONTROLS --- */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .action-card {
            background: var(--glass-bright);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .action-card:hover {
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-3px);
        }

        .action-card i {
            color: var(--accent-cyan);
            width: 24px;
            height: 24px;
        }

        .action-card span {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .btn-add {
            background: var(--accent-cyan);
            color: var(--bg-deep);
        }

        .btn-add:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .btn-reset {
            background: rgba(255, 77, 109, 0.1);
            color: var(--accent-rose);
            border: 1px solid rgba(255, 77, 109, 0.2);
            margin-top: auto;
        }

        .btn-reset:hover {
            background: rgba(255, 77, 109, 0.2);
        }

        /* --- DILUTION PANEL --- */
        .dilution-box {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.05) 0%, transparent 100%);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 24px;
            padding: 20px;
            margin-top: 10px;
        }

        .dilution-formula {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
        }

        .snap-state {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .snap-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-glass);
        }

        .snap-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .snap-val {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-emerald);
        }

        .formula-display {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            width: 100%;
            text-align: center;
            border: 1px dashed var(--accent-cyan);
        }

        /* Toasts */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-cyan);
            color: var(--bg-deep);
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 800;
            z-index: 2000;
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- RESPONSIVE QUERIES --- */
        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                height: 100vh;
                overflow: hidden;
                padding: 16px;
                gap: 16px;
            }

            body {
                overflow: hidden;
            }

            .panel {
                display: none;
                height: calc(100vh - 120px);
                border-radius: 24px;
                padding: 20px;
                overflow: hidden;
            }

            .panel.active {
                display: flex;
                animation: panelFade 0.4s ease;
            }

            .workstation {
                height: 100%;
                padding: 0;
                justify-content: flex-start;
                margin-top: 40px;
            }

            .workstation.hidden {
                display: none;
            }

            .beaker-container {
                width: 100%;
                max-width: 320px;
                height: 380px;
                margin-bottom: 20px;
            }

            .hud-overlay {
                top: 0px;
                right: 0;
                left: 0;
                width: 100%;
                min-width: unset;
                padding: 12px;
                border-radius: 16px;
            }

            .stat-value {
                font-size: 1.2rem;
            }

            .mobile-nav {
                display: flex;
            }
        }

        @keyframes panelFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h1
            style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">
            Laboratório de Simulação: Concentração e Diluição</h1>
        <!-- SHELF: SOLUTOS -->
        <section class="panel" id="panel-inventory">
            <div class="panel-title">Estoque de Solutos</div>
            <div class="scroll-area" id="solute-shelf">
                <!-- Injected via JS -->
            </div>

            <div
                style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--text-dim); margin-top: 15px; text-align: center; border-top: 1px solid var(--border-glass); padding-top: 15px;">
                C = m / V
            </div>
        </section>

        <!-- MAIN LAB VISUAL -->
        <section class="workstation active" id="workstation-view">
            <div class="hud-overlay" id="hud">
                <div class="stat-group">
                    <div class="stat-label">Concentração Atual</div>
                    <div class="stat-value" id="conc-val">0.00 <small>g/L</small></div>
                </div>
                <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <div class="stat-label">Volume</div>
                        <div style="font-family:'JetBrains Mono'; font-size: 1rem; color: white;">
                            <span id="vol-stat">0.50</span>L
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="stat-label">Massa</div>
                        <div style="font-family:'JetBrains Mono'; font-size: 1rem; color: white;">
                            <span id="mass-stat">0</span>g
                        </div>
                    </div>
                </div>
            </div>

            <div class="beaker-container">
                <div style="position: absolute; width: 100%; height: 50px; pointer-events: none; opacity: 0;"
                    id="steam"></div>
                <div class="beaker-glass"></div>
                <canvas id="main-canvas"></canvas>
            </div>

            <div id="status-badge" class="class-badge state-unsat">
                <i data-lucide="check-circle"></i> Insaturada
            </div>
        </section>

        <!-- TOOLS & DILUTION -->
        <section class="panel" id="panel-tools">
            <div class="panel-title">Instrumentação</div>

            <div class="scroll-area">
                <div class="controls-grid">
                    <div class="action-card" onclick="changeLiquid(0.1)">
                        <i data-lucide="droplet"></i>
                        <span>+100mL Água</span>
                    </div>
                    <div class="action-card" onclick="changeLiquid(-0.1)">
                        <i data-lucide="pipette"></i>
                        <span>Drenar Água</span>
                    </div>
                    <div class="action-card" onclick="evaporate()">
                        <i data-lucide="sun"></i>
                        <span>Evaporar</span>
                    </div>
                    <div class="action-card" onclick="removeSolution()">
                        <i data-lucide="glass-water"></i>
                        <span>Remover Solução</span>
                    </div>
                </div>

                <button class="btn-main btn-add" onclick="addSoluteMass()">
                    <i data-lucide="plus-circle"></i> Adicionar 5g Soluto
                </button>

                <div class="dilution-box">
                    <div
                        style="font-weight: 700; color: var(--accent-cyan); display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="calculator" style="width:18px"></i>
                        Lei da Diluição
                    </div>

                    <div class="dilution-formula">
                        <div class="formula-display">C₁V₁ = C₂V₂</div>

                        <button class="btn-main"
                            style="background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); margin-top: 10px; padding: 10px; font-size: 0.75rem;"
                            onclick="snapshotState()">
                            Fixar Inicial (C₁, V₁)
                        </button>

                        <div class="snap-state">
                            <div class="snap-item">
                                <div class="snap-label">C₁</div>
                                <div class="snap-val" id="snap-c1">--</div>
                            </div>
                            <div class="snap-item">
                                <div class="snap-label">V₁</div>
                                <div class="snap-val" id="snap-v1">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-main btn-reset" onclick="resetLab()">
                <i data-lucide="refresh-cw"></i> Reiniciar Lab
            </button>
        </section>
    </div>

    <!-- Navegação Mobile -->
    <nav class="mobile-nav">
        <label class="mb-nav-link" onclick="showView('inventory')" id="nav-inventory">
            <i data-lucide="beaker"></i>
            <span>Estoque</span>
        </label>
        <label class="mb-nav-link active" onclick="showView('lab')" id="nav-lab">
            <i data-lucide="eye"></i>
            <span>Lab</span>
        </label>
        <label class="mb-nav-link" onclick="showView('tools')" id="nav-tools">
            <i data-lucide="wrench"></i>
            <span>Ferramentas</span>
        </label>
    </nav>

    <script>
        const SOLUTES = [
            { id: 'cuso4', name: 'Sulfato de Cobre (II)', color: '#00a8ff', s: 317, icon: 'beaker' },
            { id: 'nichromate', name: 'Cromato de Potássio', color: '#fed330', s: 630, icon: 'flask-conical' },
            { id: 'niso4', name: 'Sulfato de Níquel', color: '#20bf6b', s: 400, icon: 'test-tube' },
            { id: 'nacl', name: 'Sal de Cozinha', color: '#ffffff', s: 360, icon: 'circle-dot' },
            { id: 'sugar', name: 'Açúcar (Sacarose)', color: '#f1f2f6', s: 2000, icon: 'shapes' }
        ];

        let state = {
            activeSolute: SOLUTES[0],
            mass: 0,
            volume: 0.5,
            concentration: 0,
            residue: 0,
            state: 'state-unsat',
            particles: [],
            snapshot: { c: null, v: null }
        };

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function init() {
            w = canvas.parentElement.clientWidth; h = canvas.parentElement.clientHeight;
            canvas.width = w; canvas.height = h;
            buildShelf();
            lucide.createIcons();
            updateStats();
            requestAnimationFrame(loop);

            window.addEventListener('resize', handleResize);
        }

        function handleResize() {
            w = canvas.parentElement.clientWidth; h = canvas.parentElement.clientHeight;
            canvas.width = w; canvas.height = h;
        }

        function showView(view) {
            const panels = ['inventory', 'tools'];
            const workstation = document.getElementById('workstation-view');
            const navItems = ['nav-inventory', 'nav-lab', 'nav-tools'];

            navItems.forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');

            if (view === 'lab') {
                workstation.classList.remove('hidden');
                panels.forEach(p => document.getElementById(`panel-${p}`).classList.remove('active'));
            } else {
                workstation.classList.add('hidden');
                panels.forEach(p => {
                    const el = document.getElementById(`panel-${p}`);
                    if (p === view) el.classList.add('active');
                    else el.classList.remove('active');
                });
            }
            handleResize();
        }

        function buildShelf() {
            const shelf = document.getElementById('solute-shelf');
            shelf.innerHTML = "";
            SOLUTES.forEach(s => {
                const card = document.createElement('div');
                card.className = `substance-card ${state.activeSolute.id === s.id ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="substance-icon" style="background:${s.color}22; border:1px solid ${s.color}44">
                        <i data-lucide="${s.icon}" style="color:${s.color}; width:22px;"></i>
                    </div>
                    <div>
                        <div style="font-weight:700; font-size:0.9rem;">${s.name}</div>
                        <small style="color:var(--text-dim)">Solubilidade: ${s.s}g/L</small>
                    </div>
                `;
                card.onclick = () => selectSolute(s);
                shelf.appendChild(card);
            });
        }

        function selectSolute(s) {
            state.activeSolute = s;
            state.mass = 0;
            state.particles = [];
            state.snapshot = { c: null, v: null };
            document.getElementById('snap-c1').innerText = "--";
            document.getElementById('snap-v1').innerText = "--";
            buildShelf();
            updateStats();
            notify(`Selecionado: ${s.name}`);
        }

        function addSoluteMass() {
            state.mass += 5;
            for (let i = 0; i < 15; i++) {
                state.particles.push({
                    x: Math.random() * (w - 60) + 30,
                    y: -20 - Math.random() * 50,
                    size: Math.random() * 3 + 1,
                    vy: Math.random() * 4 + 2,
                    vx: (Math.random() - 0.5) * 1,
                    settled: false
                });
            }
            updateStats();
        }

        function changeLiquid(amt) {
            state.volume = Math.round((state.volume + amt) * 100) / 100;
            state.volume = Math.max(0.1, Math.min(1.0, state.volume));
            updateStats();
        }

        function evaporate() {
            const steam = document.getElementById('steam');
            gsap.to(steam, { opacity: 1, duration: 0.3, yoyo: true, repeat: 5 });
            gsap.to(state, {
                volume: Math.max(0.1, Math.round((state.volume - 0.1) * 10) / 10),
                duration: 2,
                onUpdate: updateStats,
                onComplete: () => { steam.opacity = 0; }
            });
        }

        function removeSolution() {
            const ratio = state.volume > 0.1 ? (state.volume - 0.1) / state.volume : 0;
            state.volume = Math.max(0.1, state.volume - 0.1);
            state.mass *= ratio;
            updateStats();
        }

        function snapshotState() {
            if (state.concentration === 0) {
                notify("⚠️ Adicione soluto antes!");
                return;
            }
            state.snapshot = { c: state.concentration, v: state.volume };
            document.getElementById('snap-c1').innerText = state.snapshot.c.toFixed(2);
            document.getElementById('snap-v1').innerText = state.snapshot.v.toFixed(2) + "L";
            notify("✅ Solução Inicial Fixada!");
        }

        function updateStats() {
            const s = state.activeSolute.s;
            const maxDissolvable = s * state.volume;

            if (state.mass <= maxDissolvable) {
                state.concentration = state.mass / state.volume;
                state.residue = 0;
                state.state = 'state-unsat';
                if (Math.abs(state.mass - maxDissolvable) < 0.01) state.state = 'state-sat';
            } else {
                state.concentration = s;
                state.residue = state.mass - maxDissolvable;
                state.state = 'state-supersat';
            }

            document.getElementById('conc-val').innerHTML = `${state.concentration.toFixed(2)} <small>g/L</small>`;
            document.getElementById('mass-stat').innerText = state.mass.toFixed(1);
            document.getElementById('vol-stat').innerText = state.volume.toFixed(2);

            const badge = document.getElementById('status-badge');
            badge.className = `class-badge ${state.state}`;
            const statusText = state.state === 'state-unsat' ? 'Insaturada' : (state.state === 'state-sat' ? 'Saturada' : 'Saturada (Corpo de Fundo)');
            badge.innerHTML = `<i data-lucide="${state.state === 'state-unsat' ? 'check-circle' : 'alert-triangle'}"></i> ${statusText}`;

            // Lógica de Diluição C1V1 = C2V2
            if (state.snapshot.c !== null) {
                const c1v1 = state.snapshot.c * state.snapshot.v;
                const c2v2 = state.concentration * state.volume;
                // Se não houver resíduo, c1v1 deve ser igual ao c2v2 se a massa de soluto não mudou. 
                // Mas aqui estamos manipulando livremente. O foco é mostrar o cálculo.
                const formulaTag = document.querySelector('.formula-display');
                formulaTag.innerText = `(${state.snapshot.c.toFixed(1)} × ${state.snapshot.v.toFixed(1)}) = (${state.concentration.toFixed(1)} × ${state.volume.toFixed(1)})`;

                // Se a diferença for pequena (conservação de massa), destaca
                if (Math.abs(c1v1 - c2v2) < 0.1) {
                    formulaTag.style.borderColor = "var(--accent-emerald)";
                    formulaTag.style.color = "var(--accent-emerald)";
                } else {
                    formulaTag.style.borderColor = "var(--accent-cyan)";
                    formulaTag.style.color = "white";
                }
            }

            lucide.createIcons();
        }

        function loop() {
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            const r = 50;
            ctx.beginPath();
            ctx.moveTo(30, 0); ctx.lineTo(w - 30, 0); ctx.lineTo(w - 30, h - r); ctx.quadraticCurveTo(w - 30, h, w - 30 - r, h);
            ctx.lineTo(30 + r, h); ctx.quadraticCurveTo(30, h, 30, h - r); ctx.closePath();
            ctx.clip();

            let level = state.volume * (h - 60);
            let y = h - level;

            const intensity = Math.min(1.0, (state.concentration / state.activeSolute.s) + 0.1);
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = hexToRgba(state.activeSolute.color, intensity * 0.6);
            ctx.fillRect(0, y, w, level);

            ctx.globalAlpha = 1.0;
            const grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, 'rgba(255,255,255,0)');
            grad.addColorStop(0.2, 'rgba(255,255,255,0.05)');
            grad.addColorStop(0.5, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            state.particles.forEach((p, idx) => {
                ctx.fillStyle = state.activeSolute.color;
                ctx.globalAlpha = p.settled ? 0.9 : 1.0;
                if (!p.settled) {
                    p.y += p.vy; p.x += p.vx;
                    if (p.y > h - 10) { p.y = h - 10 - Math.random() * 10; p.settled = true; }
                } else {
                    p.x += Math.sin(Date.now() / 500 + idx) * 0.1;
                }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });

            if (state.residue > 0) {
                const resHeight = Math.min(40, state.residue / 10);
                ctx.fillStyle = state.activeSolute.color;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(35, h); ctx.quadraticCurveTo(w / 2, h - resHeight, w - 35, h); ctx.fill();
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function resetLab() {
            state.mass = 0; state.volume = 0.5; state.particles = []; state.snapshot = { c: null, v: null };
            document.getElementById('snap-c1').innerText = "--";
            document.getElementById('snap-v1').innerText = "--";
            updateStats();
            notify("Pé-de-laboratório limpo!");
        }

        function notify(msg) {
            const t = document.createElement('div'); t.className = 'toast';
            t.style.cssText = "position:fixed; top:30px; left:50%; transform:translateX(-50%); background:var(--accent-cyan); color:var(--bg-deep); padding:14px 28px; border-radius:40px; font-weight:800; z-index:2000; box-shadow:0 15px 40px rgba(0,242,255,0.3);";
            t.innerHTML = `<i data-lucide="zap"></i> ${msg}`; document.body.appendChild(t);
            lucide.createIcons();

            const anim = gsap.from(t, {
                y: -40, opacity: 0, duration: 0.5, ease: "power2.out",
                // Reduced motion check
                ...(window.matchMedia('(prefers-reduced-motion: reduce)').matches ? { y: 0, scale: 0.9 } : {})
            });

            setTimeout(() => {
                gsap.to(t, {
                    opacity: 0,
                    onComplete: () => {
                        anim.kill();
                        t.remove();
                    }
                });
            }, 2500);
        }

        window.onload = init;
    </script>
</body>

</html>
