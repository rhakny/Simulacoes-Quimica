<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratório Investigativo - Química Interativa</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05070a;
            --panel-glass: rgba(13, 17, 23, 0.7);
            --border-glass: rgba(255, 255, 255, 0.12);
            --glass-bright: rgba(255, 255, 255, 0.05);
            --accent-cyan: #00f2ff;
            --accent-emerald: #00ff9d;
            --accent-amber: #ffb300;
            --accent-rose: #ff4d6d;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- LAYOUT --- */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            height: 100vh;
            padding: 24px;
            gap: 24px;
            position: relative;
        }

        .panel {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-cyan);
            letter-spacing: 2.5px;
            margin-bottom: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        /* --- WORKSTATION --- */
        .workstation {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .beaker-container {
            position: relative;
            width: 360px;
            height: 460px;
            margin-bottom: 40px;
        }

        #main-canvas {
            width: 100%;
            height: 100%;
            z-index: 2;
            position: relative;
        }

        .beaker-glass {
            position: absolute;
            inset: 0;
            border-left: 5px solid rgba(255,255,255,0.12);
            border-right: 5px solid rgba(255,255,255,0.12);
            border-bottom: 8px solid rgba(255,255,255,0.12);
            border-radius: 0 0 50px 50px;
            z-index: 3;
            pointer-events: none;
        }

        /* --- HUD --- */
        .hud-overlay {
            position: absolute;
            top: 40px; right: 40px;
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            padding: 20px;
            border-radius: 24px;
            min-width: 220px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; color: var(--accent-cyan); font-weight: 600; }

        .class-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 15px;
            border: 1px solid transparent;
        }

        .state-homo { background: rgba(0, 255, 157, 0.08); color: var(--accent-emerald); border-color: rgba(0, 255, 157, 0.2); }
        .state-hetero { background: rgba(255, 179, 0, 0.08); color: var(--accent-amber); border-color: rgba(255, 179, 0, 0.2); }

        /* --- INVENTORY ITEMS --- */
        .scroll-area { 
            overflow-y: auto; 
            flex-grow: 1; 
            padding-right: 8px; 
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .item-card {
            background: var(--glass-bright);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .item-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); border-color: var(--accent-cyan); }
        
        .item-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
        }

        /* --- MOBILE NAV --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            padding: 12px 24px 34px 24px;
            z-index: 1000;
            justify-content: space-around;
            align-items: center;
        }

        .mb-nav-link {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-dim); font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s;
        }

        .mb-nav-link i { width: 20px; height: 20px; }
        .mb-nav-link.active { color: var(--accent-cyan); }

        /* --- RESPONSIVE --- */
        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                padding: 16px;
                gap: 16px;
                height: 100vh; /* Mantém fixo */
            }

            .panel { 
                display: none; 
                height: calc(100vh - 120px); 
                overflow: hidden;
                background: var(--bg-deep); /* Fundo sólido para cobrir o lab */
            }
            .panel.active { display: flex; animation: panelFade 0.4s ease; }

            .workstation { 
                display: none; 
                height: 100%; 
                padding: 0; 
                justify-content: flex-start; 
                margin-top: 40px; 
            }
            .workstation.active { display: flex; animation: panelFade 0.4s ease; }
            .workstation.hidden { display: none; }

            .beaker-container { width: 100%; max-width: 320px; height: 380px; margin-bottom: 20px; }
            .hud-overlay { top: 0; left: 0; right: 0; width: 100%; min-width: unset; padding: 12px; border-radius: 16px; position: absolute; }
            
            .mobile-nav { display: flex; }
        }

        @keyframes panelFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tools */
        .btn-tool {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            background: var(--glass-bright);
            color: white;
            font-family: 'Outfit';
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-tool:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-emerald); }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- PAINEL REAGENTES -->
        <section class="panel" id="panel-inventory">
            <div class="panel-title">Estoque de Reagentes</div>
            <div class="scroll-area" id="inventory-list">
                <!-- JS Inject -->
            </div>
        </section>

        <!-- LAB WORKSTATION -->
        <section class="workstation active" id="workstation-view">
            <div class="hud-overlay">
                <div class="stat-label">Análise da Mistura</div>
                <div class="stat-value" id="mixture-title">Vazio</div>
                
                <div style="margin-top: 10px;">
                    <div class="stat-label">Componentes</div>
                    <div id="mixture-details" style="font-size: 0.8rem; color: var(--text-dim);">---</div>
                </div>

                <div id="classification-badge"></div>
            </div>

            <div class="beaker-container">
                <div class="beaker-glass"></div>
                <canvas id="main-canvas"></canvas>
            </div>

            <div id="bottom-badge-placeholder"></div>
        </section>

        <!-- PAINEL FERRAMENTAS -->
        <section class="panel" id="panel-tools">
            <div class="panel-title">Ferramentas de Separação</div>
            <div class="scroll-area" id="tools-scroll">
                <button class="btn-tool" onclick="runTool('filter')"><i data-lucide="filter"></i> Filtração</button>
                <button class="btn-tool" onclick="runTool('decant')"><i data-lucide="pipette"></i> Decantação</button>
                <button class="btn-tool" onclick="runTool('distill')"><i data-lucide="flask-conical"></i> Destilação</button>
                <button class="btn-tool" onclick="runTool('evap')"><i data-lucide="sun"></i> Evaporação</button>
                <button class="btn-tool" onclick="runTool('magnet')"><i data-lucide="magnet"></i> Imantação</button>
                <button class="btn-tool" style="margin-top: 20px; background: rgba(255, 77, 109, 0.1); border-color: rgba(255, 77, 109, 0.2); color: var(--accent-rose);" onclick="resetLab()">
                    <i data-lucide="refresh-cw"></i> Limpar Tudo
                </button>
            </div>
        </section>
    </div>

    <!-- NAVEGAÇÃO MOBILE -->
    <nav class="mobile-nav">
        <div class="mb-nav-link" onclick="switchTab('inventory', this)">
            <i data-lucide="beaker"></i>
            <span>Estoque</span>
        </div>
        <div class="mb-nav-link active" onclick="switchTab('lab', this)">
            <i data-lucide="eye"></i>
            <span>Lab</span>
        </div>
        <div class="mb-nav-link" onclick="switchTab('tools', this)">
            <i data-lucide="wrench"></i>
            <span>Ferramentas</span>
        </div>
    </nav>

    <script>
        const REAGENTS = [
            { id: 'water', name: 'Água', color: 'rgba(64, 164, 255, 0.3)', type: 'polar', state: 'liquid', density: 1.0, icon: 'droplet' },
            { id: 'alcohol', name: 'Álcool', color: 'rgba(120, 255, 240, 0.25)', type: 'polar', state: 'liquid', density: 0.79, icon: 'beaker' },
            { id: 'oil', name: 'Óleo', color: 'rgba(255, 220, 64, 0.6)', type: 'nonpolar', state: 'liquid', density: 0.9, icon: 'waves' },
            { id: 'salt', name: 'Sal', color: '#ffffff', type: 'soluble-polar', state: 'solid', density: 2.1, icon: 'circle-dot' },
            { id: 'sugar', name: 'Açúcar', color: '#f8fafc', type: 'soluble-polar', state: 'solid', density: 1.6, icon: 'shapes' },
            { id: 'sand', name: 'Areia', color: '#d4b483', type: 'insoluble', state: 'solid', density: 2.6, icon: 'mountain' },
            { id: 'iron', name: 'Ferro', color: '#444444', type: 'insoluble', state: 'solid', density: 7.8, icon: 'anvil', magnetic: true }
        ];

        let mixture = [];
        let particles = [];
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        class Particle {
            constructor(reagent) {
                this.reagent = reagent;
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = -20;
                this.size = this.reagent.state === 'solid' ? Math.random() * 3 + 1.5 : Math.random() * 6 + 4;
                this.vy = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.dissolved = false;
            }
            update(level) {
                let floor = h - 20;
                if (this.reagent.type === 'nonpolar') floor = h - level + 20;
                if (this.reagent.type === 'soluble-polar' && this.y > h - level) this.dissolved = true;

                if (this.y < floor) { this.y += this.vy; this.x += this.vx; }
                else { this.x += Math.sin(Date.now() / 600) * 0.1; }
            }
            draw() {
                ctx.globalAlpha = this.dissolved ? 0.08 : 1.0;
                ctx.fillStyle = this.reagent.color;
                ctx.beginPath();
                if (this.reagent.state === 'solid') ctx.rect(this.x, this.y, this.size, this.size);
                else ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            handleResize();
            buildInventory();
            lucide.createIcons();
            requestAnimationFrame(loop);
            window.addEventListener('resize', handleResize);
        }

        function handleResize() {
            w = canvas.parentElement.clientWidth;
            h = canvas.parentElement.clientHeight;
            canvas.width = w; canvas.height = h;
        }

        function buildInventory() {
            const list = document.getElementById('inventory-list');
            REAGENTS.forEach(r => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-icon"><i data-lucide="${r.icon}" style="color: ${r.color}"></i></div>
                    <div style="flex-grow: 1;">
                        <div style="font-weight: 600; font-size: 0.9rem;">${r.name}</div>
                        <div style="font-size: 0.7rem; color: var(--text-dim);">${r.type}</div>
                    </div>
                    <i data-lucide="plus" style="width: 16px; opacity: 0.5;"></i>
                `;
                card.onclick = () => addReagent(r);
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function addReagent(r) {
            mixture.push(r);
            for(let i=0; i<30; i++) particles.push(new Particle(r));
            updateLogic();
            notify(`${r.name} adicionado`);
            if (window.innerWidth < 1100) switchTab('lab');
        }

        function updateLogic() {
            const names = [...new Set(mixture.map(m => m.name))];
            document.getElementById('mixture-details').innerText = names.length > 0 ? names.join(", ") : "---";
            
            const title = document.getElementById('mixture-title');
            const badge = document.getElementById('classification-badge');
            const bottomBadge = document.getElementById('bottom-badge-placeholder');

            if (mixture.length === 0) {
                title.innerText = "Vazio";
                badge.innerHTML = "";
                bottomBadge.innerHTML = "";
                return;
            }

            title.innerText = names.length > 1 ? "Mistura" : names[0];

            let isHetero = false;
            const hasPolar = mixture.some(m => m.type === 'polar' || m.type === 'soluble-polar');
            const hasNonPolar = mixture.some(m => m.type === 'nonpolar');
            const hasInsoluble = mixture.some(m => m.type === 'insoluble');

            if ((hasPolar && hasNonPolar) || hasInsoluble) isHetero = true;

            const badgeHTML = isHetero ? 
                `<div class="class-badge state-hetero"><i data-lucide="layers"></i> Heterogênea</div>` : 
                `<div class="class-badge state-homo"><i data-lucide="check-circle"></i> Homogênea</div>`;

            badge.innerHTML = ""; // Limpa o HUD
            bottomBadge.innerHTML = badgeHTML; // Move para baixo do béquere (como no screenshot)
            lucide.createIcons();
        }

        function runTool(tool) {
            if (mixture.length === 0) return;
            let removedCount = 0;
            let msg = "";

            if (tool === 'filter') {
                const initial = mixture.length;
                mixture = mixture.filter(m => m.state !== 'solid' || m.type === 'soluble-polar');
                removedCount = initial - mixture.length;
                msg = "Sólidos insolúveis filtrados";
            } else if (tool === 'decant') {
                const initial = mixture.length;
                mixture = mixture.filter(m => m.type !== 'nonpolar');
                removedCount = initial - mixture.length;
                msg = "Líquidos imiscíveis decantados";
            } else if (tool === 'distill') {
                mixture = [mixture[0]]; // Simplificação: sobra apenas o primeiro componente
                msg = "Destilação concluída: substância pura";
            } else if (tool === 'evap') {
                mixture = mixture.filter(m => m.state === 'solid');
                msg = "Líquidos evaporados: restam sólidos";
            } else if (tool === 'magnet') {
                const initial = mixture.length;
                mixture = mixture.filter(m => !m.magnetic);
                removedCount = initial - mixture.length;
                msg = "Materiais magnéticos extraídos";
            }

            particles = particles.filter(p => mixture.includes(p.reagent));
            updateLogic();
            notify(msg);
        }

        function loop() {
            ctx.clearRect(0, 0, w, h);
            
            // Desenhar clipping do béquere
            ctx.save();
            const r = 50; 
            ctx.beginPath();
            ctx.moveTo(0,0); ctx.lineTo(w,0); ctx.lineTo(w, h-r);
            ctx.quadraticCurveTo(w, h, w-r, h);
            ctx.lineTo(r, h);
            ctx.quadraticCurveTo(0, h, 0, h-r);
            ctx.closePath();
            ctx.clip();

            let vol = mixture.filter(m => m.state === 'liquid').length;
            let level = Math.min(vol * 50, h - 30);

            if (mixture.some(m => m.type === 'polar' || m.type === 'soluble-polar')) {
                ctx.fillStyle = 'rgba(64,164,255,0.2)';
                ctx.fillRect(0, h-level, w, level);
            }
            if (mixture.some(m => m.type === 'nonpolar')) {
                ctx.fillStyle = 'rgba(255,220,64,0.4)';
                let y = mixture.some(m => m.type.includes('polar')) ? h-level-40 : h-40;
                ctx.fillRect(0, y, w, 40);
            }

            particles.forEach(p => { p.update(level); p.draw(); });
            ctx.restore();
            requestAnimationFrame(loop);
        }

        function switchTab(tab, btn) {
            // Remove active de todos
            document.querySelectorAll('.panel, .workstation').forEach(el => {
                el.classList.remove('active');
                el.style.display = 'none';
            });
            document.querySelectorAll('.mb-nav-link').forEach(el => el.classList.remove('active'));
            
            if (btn) btn.classList.add('active');
            else {
                const navLinks = document.querySelectorAll('.mb-nav-link');
                if (tab === 'inventory') navLinks[0].classList.add('active');
                if (tab === 'lab') navLinks[1].classList.add('active');
                if (tab === 'tools') navLinks[2].classList.add('active');
            }

            const target = tab === 'lab' ? 'workstation-view' : (tab === 'inventory' ? 'panel-inventory' : 'panel-tools');
            const targetEl = document.getElementById(target);
            targetEl.classList.add('active');
            targetEl.style.display = 'flex';
            
            lucide.createIcons();
        }

        function resetLab() {
            mixture = [];
            particles = [];
            updateLogic();
            notify("Laboratório limpo");
        }

        function notify(msg) {
            const t = document.createElement('div');
            t.style.cssText = "position:fixed; top:30px; left:50%; transform:translateX(-50%); background:var(--accent-cyan); color:var(--bg-deep); padding:14px 28px; border-radius:40px; font-weight:800; z-index:5000; box-shadow:0 10px 30px rgba(0,242,255,0.3); display:flex; align-items:center; gap:12px;";
            t.innerHTML = `<i data-lucide="info"></i> ${msg}`;
            document.body.appendChild(t);
            lucide.createIcons();
            gsap.from(t, { y: -50, opacity: 0, duration: 0.5 });
            setTimeout(() => gsap.to(t, { opacity: 0, y: -20, onComplete: () => t.remove() }), 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
